
# =========================================
# SERVER
# =========================================
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# =========================================
# SPRING APPLICATION
# =========================================
spring.application.name=user-management

# =========================================
# DATABASE CONFIGURATION
# =========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/userauth_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Alevo@2018.}

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# =========================================
# JPA / HIBERNATE
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =========================================
# CACHE CONFIGURATION
# =========================================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=10m

# =========================================
# JWT CONFIGURATION
# =========================================
jwt.secret=${JWT_SECRET:your-very-strong-secret-key-at-least-256-bits-long-for-hs256-algorithm}
jwt.access-token-expiry-ms=900000
jwt.refresh-token-expiry-ms=2592000000
jwt.device-link-token-expiry-ms=300000

# =========================================
# OTP CONFIGURATION
# =========================================
otp.length=6
otp.expiry-minutes=10
otp.max-attempts=3
otp.resend-cooldown-seconds=60

# =========================================
# DEVICE CONFIGURATION
# =========================================
device.max-linked-devices=4
device.session-timeout-days=30

# =========================================
# SMS CONFIGURATION
# =========================================
sms.provider=console

# Twilio
sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
sms.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
sms.twilio.from-number=${TWILIO_FROM_NUMBER:}

# Africa's Talking
sms.africas-talking.api-key=${AT_API_KEY:}
sms.africas-talking.username=${AT_USERNAME:}
sms.africas-talking.sender-id=${AT_SENDER_ID:UserAuth}

# =========================================
# LOGGING
# =========================================
logging.level.com.userauth=DEBUG
logging.level.org.springframework.security=INFO

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n